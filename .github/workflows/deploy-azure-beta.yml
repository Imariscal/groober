name: Deploy VibraLive Beta to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_SUBSCRIPTION_ID: ea092bf5-9971-4502-b997-37ec136aeb2d
  AZURE_RESOURCEGROUP: vibralive-beta-rg
  AZURE_APPSERVICE_BACKEND: vibralive-api-beta
  AZURE_APPSERVICE_FRONTEND: vibralive-web-beta
  NODE_VERSION: '20'
  REGISTRY_NAME: vibralivereg

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vibralive-backend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: vibralive-backend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test --passWithNoTests
      continue-on-error: true
    
    - name: Build
      run: npm run build
    
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_APPSERVICE_BACKEND }}
        package: vibralive-backend/dist
        
    - name: Run Database Migrations
      env:
        DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
        DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
        DATABASE_USER: ${{ secrets.DATABASE_USER }}
        DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
      run: npm run migration:run
      
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vibralive-frontend
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: vibralive-frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm test --passWithNoTests
      continue-on-error: true
    
    - name: Build
      run: npm run build
      env:
        API_BACKEND_URL: https://${{ env.AZURE_APPSERVICE_BACKEND }}.azurewebsites.net
    
    - name: Deploy to Static Web App
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BETA }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: upload
        app_location: vibralive-frontend
        output_location: .next
        
  notification:
    needs: [build-and-deploy-backend, build-and-deploy-frontend]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check Job Status
      run: |
        if [ "${{ needs.build-and-deploy-backend.result }}" == "failure" ] || [ "${{ needs.build-and-deploy-frontend.result }}" == "failure" ]; then
          echo "❌ Deploy FAILED"
          exit 1
        else
          echo "✅ Deploy SUCCESS"
        fi
